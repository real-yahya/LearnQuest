<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title>Registration and Login System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <style media="screen">
        *,
        *:before,
        *:after{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .background{ /* moves the background div to the centre of the screen  */
            width: 430px;
            height: 550px;
            position: absolute;
            transform: translate(-50%,-50%);
            left: 50%;
            top: 50%;
        }
        .background .shape{ /* changes dimension of square and makes it a circle */
            height: 200px;
            width: 200px;
            position: absolute;
            border-radius: 50%;
        }
        .shape:first-child{ /* repositions a circle and adds a gradient*/
            background: linear-gradient(
                    #1845ad,
                    #23a2f6
            );
            left: +420px;
            top: -110px;
        }
        .shape:last-child{ /* repositions a circle and adds a gradient*/
            background: linear-gradient(
                    to right,
                    #ff512f,
                    #f09819
            );
            left: +890px;
            top: +460px;
        }

        
        .main form a{
            font-weight: 700;
        }
        .background{
            position: absolute;
            width: 1470px;
            max-height: 100vh;
        }
        body{
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .main h3{
            font-size: 32px;
            font-weight: 500;
            line-height: 42px;
            text-align: center;
            color: black;
        }
        .main *{
            font-family: 'Poppins',sans-serif;
            letter-spacing: 0.5px;
            outline: none;
            border: none;
        }
        .main label{
            color: black;
        }
        .main{ /*applies colour, changes opacity and adds back-drop to the background of the form*/
            height: fit-content;
            display: flex;
            justify-content: center;
            align-items: center;
            vertical-align: center;
            max-width: fit-content;
            max-height: fit-content;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(8,7,16,0.6);
            background-color: rgba(255,255,255,0.13);
            padding: 50px 35px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            /*transform: translate(-50%,-50%);*/
        }
        label{
            display: block;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 500;
        }
        input{
            display: block;
            height: 50px;
            width: 366px;
            background-color: #c5c5c5;
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
        }
        ::placeholder{
            color: black;
        }
        button{
            margin-top: 35px;
            width: 100%;
            color: #e8e8e8;
            background-color: #004fce;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            border-radius: 5px;
        }
        button:hover{
            color: white;
        }
        a{
            cursor:pointer;
            text-decoration: none;
            text-underline: none;
            color: #004fce;

        }
        a:hover{
            color: black ;
        }
        .anchor {
            margin-top:15px;
            text-align: center;
            font-size: 18px;
        }

        .msg{
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            width: 100%;
            height: 23px;
        }

        .alert{
            color: red;
            padding: 0;
        }

        select.form-control {
            position: relative; /* Ensure the parent is relatively positioned */
            width: 100%; /* Fills the width of the container */
            background-color: #c5c5c5; /* Grey background color */
            border-radius: 3px; /* Rounded corners */
            padding: 8px 32px 8px 10px; /* Adjust padding as needed */
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
            -moz-appearance: none; /* Remove default Firefox styling */
            -webkit-appearance: none; /* Remove default Webkit/Blink (Chrome/Safari) styling */
            appearance: none; /* Remove default appearance styles */
            height: 50px; /* Adjusted height */
        }


        select.form-control::after {
            content: ''; /* Empty content */
            border-left: 6px solid transparent; /* Adjust arrow size as needed */
            border-right: 6px solid transparent; /* Adjust arrow size as needed */
            border-top: 6px solid black; /* Adjust arrow color and size as needed */
            position: absolute;
            top: calc(50% - 3px); /* Vertically center the arrow */
            right: 10px; /* Adjust as needed */
        }

        .success{
            padding: 16px;
        }


    </style>
</head>
<body>

<div class="background"> <!-- divs for the background circles -->
    <div class="shape"></div>
    <div class="shape"></div>
</div>
<div class="msg" th:if="${param.success}"> <!--pop up in the case that the data is invalid-->
    <div class="success alert-info">
        You have successfully registered our app!
    </div>
</div>
<div class="main">

    <form method="post"
          role="form"
          th:action="@{/register/save}"
          th:object="${user}"
    >                     <!-- form that makes a class with certain attributes and sends it to register/save-->
        <h3>Register</h3>

        <label >First Name</label>
        <input
                id="firstName"
                name="firstName"
                placeholder="Enter first name"
                th:field="*{firstName}"
                type="text"
        />
        <p th:errors = "*{firstName}" class="alert"
           th:if="${#fields.hasErrors('firstName')}"></p> <!--error that pops up in the case that field is empty-->


        <label >Last Name</label>
        <input
                id="lastName"
                name="lastName"
                placeholder="Enter last name"
                th:field="*{lastName}"
                type="text"
        />
        <p th:errors = "*{lastName}" class="alert"
           th:if="${#fields.hasErrors('lastName')}"></p>


        <label >Email</label>
        <input
                id="email"
                name="email"
                placeholder="Enter email address"
                th:field="*{email}"
                type="email"
        />
        <p th:errors = "*{email}" class="alert"
           th:if="${#fields.hasErrors('email')}"></p>

        <label >Password</label>
        <input
                id="password"
                name="password"
                placeholder="Enter password"
                th:field="*{password}"
                type="password"
        />
        <p   th:errors = "*{password}" class="alert"
           th:if="${#fields.hasErrors('password')}"></p>

        <label for="role">Role:</label>
        <select id="role" name="role" class="form-control">
            <option value="NORMAL">Normal</option>
            <option value="ADMIN">Admin</option>
        </select>

        <button type="submit">Register</button> <!--link to submit the form-->
        <p class="anchor">Already have an account? <a th:href="@{/login}">Log In</a></p> <!--link to the Login page-->
    </form>
</div>

</body>
</html>
