<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popular Courses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
    <script src="https://kit.fontawesome.com/ea5cbdcda6.js" crossorigin="anonymous"></script>
</head>
    <meta charset="UTF-8">
    <title>Favourite Courses</title>
    <style>
        *{
            margin:0;
            padding: 0;
            outline: none;
            border: none;
            text-decoration: none !important;
            box-sizing:border-box;
            font-family: "IBM Plex Sans", sans-serif;
        }

        /* Scrollbar CSS */
        /* REF - https://www.w3schools.com/howto/howto_css_custom_scrollbar.asp*/
        ::-webkit-scrollbar {
            height: 5px;
            width: 5px;
            border-radius: 20px;
        }

        /* Track */
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 20px;
        }

        /* Handle */
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 20px;
        }

        /* Handle on hover */
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        body {
            text-align: center; /* Center align all content */
            padding-top: 50px; /* Add padding to the top of the body to prevent overlap */
        }
        @keyframes fadeInMoveUpAnimation {
            0% {transform: translate(0,  50px);}
            100% {transform: translate(0,  0px);}
        }

        /*Idle float animation*/
        @keyframes floating {
            0% { transform: translate(0,  0px); }
            50%  { transform: translate(0, 20px); }
            100%   { transform: translate(0, -0px); }
        }

        @keyframes fadeInAnimation {
            0% {opacity: 0;}
            100% {opacity: 1;}
        }

        nav{
            position: fixed;

            top: 0;
            bottom: 0;
            left:0;

            height: 100%;
            width:100px;

            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;

            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(1px);

        }


        .nav-button:hover{
            background: rgba(0,0,0,0.7);
            color: white;
            transition: background 0.25s ease-in, color 0.25s ease-in;
        }


        .nav-button{
            width: 100%;
            height: 90px;
            font-size: 25px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(1px);


        }

        .current-nav-button{
            color: white;
            background: rgba(0,0,0,0.7);
            width: 100%;
            height: 90px;
            font-size: 25px;
        }
        ul{
            margin-top:50px;
        }


        /* For IBM Logo container */
        .logo-container {
            margin-bottom: 20px; /* Add margin to the bottom to create space */
        }

        /*For IBM Logo at the top*/
        .logo{
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 350px;
            width: auto;
            z-index: -1;
        }

        /* For table container */
        .table-container {
            margin: 0 auto; /* Center the table horizontally */
            text-align: center; /* Center align table content */
            width: 60%; /* Adjust table container width */
        }


        h1 {
            margin-top: 100px; /* Add some space between the logo and the header */
        }

        table {
            width: 100%; /* Adjust table width */
            margin: 20px auto; /* Center the table horizontally */
            border-collapse: collapse; /* Collapse border spacing */
            font-size: 25px;
        }

        th, td {
            padding: 15px; /* Add padding to table cells */
            border: 1px solid #ddd; /* Add border to table cells */
            text-align: center; /* Center-align text in table cells */
        }

        th {
            background-color: #f2f2f2; /* Light gray background for table header */
            font-weight: bold; /* Make header text bold */
        }

        .green-row {
            background-color: lightgreen;
        }

        .normal-row {
            background-color: #f9f9f9;
        }

        a {
            text-decoration: none; /* Remove underline from anchor tags */
            color: inherit; /* Inherit color from parent */
        }

        a:hover {
            font-weight: bold;
        }

        .highlight-text {
            color: green;
            font-weight: bold;
        }

    </style>
</head>
<body>
<!-- Navigation bar -->
<nav>
    <ul>
        <li>
            <a th:href="@{/dashboard}">
                <button class = "nav-button">
                    <i class="fa-solid fa-house"></i>
                </button>
            </a>
        </li>
        <li>
            <!-- Direct to course page -->
            <a th:href="@{/viewCourses}">
                <button class = "nav-button">
                    <i class="fa-solid fa-book"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/viewBadges}">
                <!--Button that directs to badge page-->
                <button class = "nav-button">
                    <i class="fa-solid fa-medal"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/dailyChallenge}">
                <button class = "nav-button">
                    <i class="fa-solid fa-brain"></i>
                </button>
            </a>
        </li>

        <li>
            <a th:href="@{/popularpage}">
                <button class = "current-nav-button">
                    <i class="fa-solid fa-fire"></i>
                </button>
            </a>
        </li>

        <li>
            <a th:href="@{/leaderboard}">
                <button class = "nav-button">
                    <i class="fa-solid fa-trophy"></i>
                </button>
            </a>
        </li>

        <li>
            <span th:if="${user.admin}">
                <a th:href="@{/testanalytics}">
                    <button class = "nav-button">
                        <i class="fa-solid fa-code"></i>
                    </button>
                </a>
            </span>
        </li>


    </ul>
</nav>

<div class="table-container">
    <div class="logo-container">
        <img class="logo" src="https://www.ibm.com/brand/experience-guides/developer/b1db1ae501d522a1a4b49613fe07c9f1/01_8-bar-positive.svg" alt="Logo Image">
    </div>
    <h1>Most Popular Courses</h1>
    <p class="highlight-text">3 Most Popular Courses Highlighted In Green</p>
    <table border="1" id="courseTable">
        <thead>
        <tr>
            <th>Course ID</th>
            <th onclick="sortTable('startCount')">Users doing/Completed the course</th>
        </tr>
        </thead>
        <tbody>
        <!-- Iterate over the data -->
        <tr th:each="favouritecourse, index : ${favouritecourses}">
            <!-- Display course information -->
            <td>
                <a th:href="@{/course-direct/{id} (id = ${favouritecourse.id})}"> <!-- Redirect to courses page -->
                    <span th:text="${favouritecourse.courseName}"></span>
                </a>
            </td>
            <td th:text="${favouritecourse.startCount}"></td>
        </tr>
        </tbody>
    </table>

    <script>
        // Function to sort the table by column name
        function sortTable(columnName) {
            var table, rows, switching, i, x, y, shouldSwitch;
            table = document.getElementById("courseTable");
            switching = true;
            while (switching) {
                switching = false;
                rows = table.getElementsByTagName("tr");
                for (i = 1; i < (rows.length - 1); i++) {
                    shouldSwitch = false;
                    x = parseInt(rows[i].getElementsByTagName("td")[1].textContent);
                    y = parseInt(rows[i + 1].getElementsByTagName("td")[1].textContent);
                    if (columnName === 'startCount') {
                        if (x < y) {
                            shouldSwitch = true;
                            break;
                        }
                    }
                }
                if (shouldSwitch) {
                    rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
                    switching = true;
                }
            }
            // Add green background to first three rows
            for (i = 1; i <= 3; i++) {
                rows[i].classList.add("green-row");
            }
        }

        // Automatically sort table on page load
        window.onload = function() {
            sortTable('startCount');
        };
    </script>

</div>
</body>
</html>
