
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
    <script src="https://kit.fontawesome.com/ea5cbdcda6.js" crossorigin="anonymous"></script>
</head>

<style>
    *{
        margin:0;
        padding: 0;
        outline: none;
        border: none;
        text-decoration: none !important;
        box-sizing:border-box;
        font-family: "IBM Plex Sans", sans-serif;
    }

    /* Scrollbar CSS */
    /* REF - https://www.w3schools.com/howto/howto_css_custom_scrollbar.asp*/
    ::-webkit-scrollbar {
        width:5px;
        height: 5px;
        border-radius: 20px;
    }

    /* Track */
    ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 20px;
    }

    /* Handle */
    ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 20px;
    }

    /* Handle on hover */
    ::-webkit-scrollbar-thumb:hover {
        background: #555;
    }

    body{
        width: 960px;
        margin: 0 auto;
        display: flex;
        flex-wrap:wrap;
        justify-content: space-between;

        position: absolute;

        animation: fadeInAnimation ease 1s;

        overflow: hidden;


    }

    @keyframes fadeInMoveUpAnimation {
        0% {transform: translate(0,  50px);}
        100% {transform: translate(0,  0px);}
    }

    /*Idle float animation*/
    @keyframes floating {
        0% { transform: translate(0,  0px); }
        50%  { transform: translate(0, 20px); }
        100%   { transform: translate(0, -0px); }
    }

    @keyframes fadeInAnimation {
        0% {opacity: 0;}
        100% {opacity: 1;}
    }

    nav{
        position: fixed;

        top: 0;
        bottom: 0;
        left:0;

        height: 100%;
        width:100px;

        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        overflow: hidden;

        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(1px);

    }

    .nav-button:hover{
        background: rgba(0,0,0,0.7);
        color: white;
        transition: background 0.25s ease-in, color 0.25s ease-in;
    }


    .nav-button{
        width: 100%;
        height: 90px;
        font-size: 25px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(1px);
    }

    .current-nav-button{
        color: white;
        background: rgba(0,0,0,0.7);
        width: 100%;
        height: 90px;
        font-size: 25px;
    }

    ul{
        margin-top:50px;
    }


    /* Content CSS */

    .content-box{
        position: fixed;

        width: 70%;


        margin-top: 30px;

        left: 300px;
    }

    h1 {
        text-align: center;
    }
    table {
        width: 60%;
        border-collapse: collapse;
        border: 2px solid #ddd;
        margin: 20px auto auto;
    }
    th, td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }
    th {
        background-color: #f2f2f2;
    }
    tr:nth-child(even) {
        background-color: #f2f2f2;
    }
    tr:hover {
        background-color: #ddd;
    }
    th:first-child,
    td:first-child {
        width: 10%;
    }
    th:nth-child(2),
    td:nth-child(2) {
        width: 40%;
    }
    th:nth-child(3),
    td:nth-child(3) {
        width: 50%;
    }





</style>

<body>
<!-- Navigation bar -->
<nav>
    <ul>
        <li class="nav-element">
            <a th:href="@{/dashboard}">
                <button class = "nav-button">
                    <i class="fa-solid fa-house"></i>
                </button>
            </a>
        </li>
        <li>
            <!-- Direct to course page -->
            <a th:href="@{/viewCourses}">
                <button class = "nav-button">
                    <i class="fa-solid fa-book"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/viewBadges}">
                <!--Button that directs to badge page-->
                <button class = "nav-button">
                    <i class="fa-solid fa-medal"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/dailyChallenge}">
                <button class = "nav-button">
                    <i class="fa-solid fa-brain"></i>
                </button>
            </a>
        </li>

        <li>
            <a th:href="@{/popularpage}">
                <button class = "nav-button">
                    <i class="fa-solid fa-fire"></i>
                </button>
            </a>
        </li>

        <li>
            <a th:href="@{/leaderboard}">
                <button class = "current-nav-button">
                    <i class="fa-solid fa-trophy"></i>
                </button>
            </a>
        </li>
        <li>
            <span th:if="${user.admin}">
                <a th:href="@{/testanalytics}">
                    <button class = "nav-button">
                        <i class="fa-solid fa-code"></i>
                    </button>
                </a>
            </span>
        </li>

    </ul>
</nav>

<div class = "content-box">
    <h1>Leaderboard</h1>
    <table>
        <thead>
        <tr>
            <th>Rank</th>
            <th>User</th>
            <th>Correct Daily Challenges</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user, index : ${userDailyChallengeList}">
            <td th:text="${index.index + 1}"></td>
            <td th:text="${user.user.name}"></td>
            <td th:text="${user.correctDailyChallengesCount}"></td>
        </tr>
        </tbody>
    </table>

    <table>
        <thead>
        <tr>
            <th>Rank</th>
            <th>User</th>
            <th>Courses Completed</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user, index : ${userCoursesCompletedList}">
            <td th:text="${index.index + 1}"></td>
            <td th:text="${user.user.name}"></td>
            <td th:text="${user.coursesCompleted}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>


</html>
