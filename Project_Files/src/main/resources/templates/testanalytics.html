<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Page</title>

    <!-- IBM Plex Sans for uniformity across the site -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
          rel="stylesheet">
    <script src="https://kit.fontawesome.com/ea5cbdcda6.js" crossorigin="anonymous"></script>

    <style>
        /*REF - https://www.30secondsofcode.org/css/s/hover-underline-animation/ */
        /* General reset and font setup */
        * {
            margin: 0;
            padding: 0;
            outline: none;
            border: none;
            text-decoration: none !important;
            box-sizing: border-box;
            font-family: "IBM Plex Sans", sans-serif;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 150px;
            overflow: hidden;
            /*height: 500px;*/
        }

        .card-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            width: 90%;
            margin: 1rem auto;
            overflow-y: auto;
        }

        /*Holds the overall analytical data content*/
        .card {
            background-color: rgba(255, 255, 255, 0.13);
            border-radius: 8px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            padding: 20px 30px;
            margin: 16px 24px;
            width: 400px;
            height: 240px;
            overflow-y: auto; /*Allows us to scroll within the card*/
            backdrop-filter: blur(10px);
        }

        /* Text style for "analytical data" header*/
        h2 {
            text-align: center;
            margin-top: 0;
        }


        /* analytical data*/
        p {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: black;
        }


        /*General page CSS*/
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            color: black;
            overflow-x: hidden;
            width: 100vw;
        }

        /* Button cursor hover animation*/
        .logout_button:hover {
            background-color: red;
            color: white;
            transition-duration: 0.2s;
        }

        .dashboard_button:hover {
            background-color: green;
            color: white;
            transition-duration: 0.2s;
        }

        /* Handles buttons on the bottom right*/
        .logout_button, .dashboard_button {
            background-color: white;
            width: 120px;
            max-width: 120px;
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            cursor: pointer;
            color: black;
            bottom: 20px;
            right: 20px;
            position: fixed;
            font-weight: 500;
        }

        .dashboard_button {
            bottom: 70px;
            text-align: left;

        }

        .bottom-nav {
            display: flex;
        }


        /* Logo styling*/
        .logo {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 350px;
            width: auto;
            z-index: -1;
        }


        /*Styling for scroll bar*/
        /*REF: https://dev.to/gaberomualdo/how-to-create-a-beautiful-custom-scrollbar-for-your-site-in-plain-css-1mjg*/
        ::-webkit-scrollbar {
            width: 20px;
        }

        ::-webkit-scrollbar-track {
            border-radius: 20px;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #d6dee1;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #000000;
            border-radius: 20px;
        }

        ::-webkit-scrollbar-thumb {
            background-color: dimgrey;
            border-radius: 20px;
            border: 6px solid transparent;
            background-clip: content-box;
        }

        ::-webkit-scrollbar-thumb:hover {
            background-color: #a8bbbf;
        }


        /* Circles Design from template :
                 https://codepen.io/fghty/pen/PojKNEG by FoolishDeveloper*/
        .background .shape {
            height: 200px;
            width: 200px;
            position: absolute;
            border-radius: 50%;
            z-index: -4;
            background: white;
            border: 9px solid black;
            animation: floatAnimation 2s ease-in-out infinite alternate; /* Idle floating animation */
            max-width: 70%;
        }

        .shape:nth-child(1) {
            height: 500px;
            width: 500px;
            left: -20%;
            top: 15%;
            animation: floatAnimation 2.4s ease-in-out infinite alternate;
        }


        .shape:nth-child(2) {
            height: 300px;
            width: 300px;
            left: 2%;
            top: 60%;
            animation: floatAnimation 2.6s ease-in-out infinite alternate;
        }

        .shape:nth-child(3) {
            height: 150px;
            width: 150px;
            left: 16%;
            top: 88%;
            z-index: -6;
            animation: floatAnimation 2.5s ease-in-out infinite alternate;
        }

        .shape:nth-child(4) {
            height: 500px;
            width: 500px;
            left: -30%;
            top: 50%;
            animation: floatAnimation 2.8s ease-in-out infinite alternate;
        }

        .shape:nth-child(5) {
            height: 500px;
            width: 500px;
            right: -20%;
            top: 15%;
            animation: floatAnimation 2.2s ease-in-out infinite alternate;
        }


        .shape:nth-child(6) {
            height: 300px;
            width: 300px;
            right: 2%;
            top: 60%;
            animation: floatAnimation 2.5s ease-in-out infinite alternate;
        }

        .shape:nth-child(7) {
            height: 150px;
            width: 150px;
            right: 16%;
            top: 88%;
            z-index: -6;
            animation: floatAnimation 2.3s ease-in-out infinite alternate;
        }


        .shape:nth-child(8) {
            height: 500px;
            width: 500px;
            right: -30%;
            top: 50%;
            animation: floatAnimation 2.34s ease-in-out infinite alternate;
        }

        .shape:nth-child(9) {
            height: 450px;
            width: 450px;
            left: -25%;
            top: -30%;
            z-index: -5;
            animation: floatAnimation 2.5s ease-in-out infinite alternate;
        }

        .shape:nth-child(10) {
            height: 450px;
            width: 450px;
            right: -25%;
            top: -30%;
            z-index: -5;

        }

        /*REF - https://www.geeksforgeeks.org/css-floating-animation/*/
        @keyframes floatAnimation {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            50% {
                transform: translateY(-12px) translateX(-8px) rotate(20deg);
            }
            100% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
        }


        body {
            font-family: 'IBM Plex Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: white;
            color: black;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        ul{
            margin-top: 50px;
        }
        nav {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            height: 100%;
            width: 100px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(1px);
        }

        .nav-button, .current-nav-button {
            width: 100%;
            height: 90px;
            font-size: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(1px);
            cursor: pointer;
        }

        .nav-button:hover, .current-nav-button {
            background: rgba(0, 0, 0, 0.7);
            color: white;
        }

        .current-nav-button {
            background: rgba(0, 0, 0, 0.7);
        }


        .container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 150px;
            overflow: hidden;
            margin-left: 100px;
        }

    </style>
</head>
<body>
<nav>
    <ul>
        <li class="nav-element">
            <a th:href="@{/dashboard}">
                <button class="nav-button">
                    <i class="fa-solid fa-house"></i>
                </button>
            </a>
        </li>
        <li>
            <!-- Direct to course page -->
            <a th:href="@{/viewCourses}">
                <button class="nav-button">
                    <i class="fa-solid fa-book"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/viewBadges}">
                <!-- Button that directs to badge page -->
                <button class="nav-button">
                    <i class="fa-solid fa-medal"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/dailyChallenge}">
                <button class="nav-button">
                    <i class="fa-solid fa-brain"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/popularpage}">
                <button class="nav-button">
                    <i class="fa-solid fa-fire"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/leaderboard}">
                <button class="nav-button">
                    <i class="fa-solid fa-trophy"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/testanalytics}">
                <button class="current-nav-button">
                    <i class="fa-solid fa-code"></i>
                </button>
            </a>
        </li>
    </ul>
</nav>
<!--logo for the web page-->
<img class="logo"
     src="https://www.ibm.com/brand/experience-guides/developer/b1db1ae501d522a1a4b49613fe07c9f1/01_8-bar-positive.svg"
     alt="Logo Image">

<!--content container-->
<div class="container">

    <div class="card-container">
<!--loops through all the course and displays a card for each one-->
        <div th:each="courseAnalytics : ${analyticsData}">
<!--            displays data for each course-->
            <div class="card">
                <h2 th:text="${courseAnalytics.key}"></h2>
                <p>Course Name: <span th:text="${courseAnalytics.key}"></span></p>
                <p>Total Number of Students Started: <span th:text="${courseAnalytics.value.startedCount}"></span></p>
                <p>Total Number of Students Completed: <span th:text="${courseAnalytics.value.completedCount}"></span>
                </p>
                <p>Total Number of Students Rated: <span th:text="${courseAnalytics.value.ratedCount}"></span></p>
                <hr>
            </div>

            <div class="bottom-nav">
                <a th:href="@{/dashboard}">
                    <button class="dashboard_button">Dashboard</button>
                </a>
                <a th:href="@{/logout}">
                    <button class=logout_button>Log Out</button>
                </a>
            </div>
        </div>

    </div>
</div>
</body>
</html>
