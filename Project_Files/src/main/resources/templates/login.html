<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
    <meta charset="UTF-8">
    <title>Registration and Login System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
          crossorigin="anonymous">
    <style media="screen">
        *,
        *:before,
        *:after{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .background{ /* moves the background div to the centre of the screen  */
            width: 430px;
            height: 550px;
            position: absolute;
            transform: translate(-50%,-50%);
            left: 50%;
            top: 50%;
        }
        .background .shape{ /* changes dimension of square and makes it a circle */
            height: 200px;
            width: 200px;
            position: absolute;
            border-radius: 50%;
        }
        .shape:first-child{ /* repositions a circle and adds a gradient*/
            background: linear-gradient(
                    #1845ad,
                    #23a2f6
            );
            left: +420px;
            top: -110px;
        }
        .shape:last-child{ /* repositions a circle and adds a gradient*/
            background: linear-gradient(
                    to right,
                    #ff512f,
                    #f09819
            );
            left: +890px;
            top: +460px;
        }


        .main form a{
            font-weight: 700;
        }
        .background{
            position: absolute;
            width: 1470px;
            max-height: 100vh;
        }
        body{ /*changes background to white and centers the form*/
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .main h3{
            font-size: 32px;
            font-weight: 500;
            line-height: 42px;
            text-align: center;
            color: black;
        }
        .main *{
            font-family: 'Poppins',sans-serif;
            letter-spacing: 0.5px;
            outline: none;
            border: none;
        }
        .main label{
            color: black;
        }
        .main{ /*applies colour, changes opacity and adds back-drop to the background of the form*/
            height: fit-content;
            display: flex;
            justify-content: center;
            align-items: center;
            vertical-align: center;
            max-width: fit-content;
            max-height: fit-content;
            border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(8,7,16,0.6);
            background-color: rgba(255,255,255,0.13);
            padding: 50px 35px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            /*transform: translate(-50%,-50%);*/
        }
        label{
            display: block;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 500;
        }
        input{
            display: block;
            height: 50px;
            width: 366px;
            background-color: #c5c5c5;
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
        }
        ::placeholder{
            color: black;
        }
        button{
            margin-top: 35px;
            width: 100%;
            color: #e8e8e8;
            background-color: #004fce;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            border-radius: 5px;
        }
        button:hover{
            color: white;
        }
        a{
            cursor:pointer;
            text-decoration: none;
            text-underline: none;
            color: #004fce;

        }
        a:hover{
            color: black ;
        }
        .anchor {
            margin-top:15px;
            text-align: center;
            font-size: 18px;
        }

        .msg{
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            width: 100%;
            height: 23px;
        }

    </style>
</head>
<body>
<div class="msg" th:if="${param.error}"> <!--error that pop up in the case that the data is invalid-->
    <div class="alert alert-danger">Invalid Email or Password</div>
</div>
<div class="msg" th:if="${param.logout}"> <!--pop up in the case that user logs out-->
    <div class="alert alert-success"> You have been logged out.</div>
</div>
<div class="background"> <!-- divs for the background circles -->
    <div class="shape"></div>
    <div class="shape"></div>
</div>
<div class="main">

    <form method="post"
          role="form"
          th:action="@{/login}"
    >                      <!-- form that sends data to login controller-->
        <h3>Login</h3>

        <label for="username"> Email</label>
        <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter email address"
        />

        <label for="password"> Password</label>
        <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password"
        />

        <button type="submit">Log In</button><br> <!--link to submit the form-->
        <p class="anchor">Don't have an account? <a th:href="@{/register}">Register</a></p> <!--link to the register page-->
    </form>
</div>

</body>
</html>
