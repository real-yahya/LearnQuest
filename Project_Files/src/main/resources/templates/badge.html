<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBM Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="path/to/font-awesome/css/font-awesome.min.css">
    <script src="https://kit.fontawesome.com/ea5cbdcda6.js" crossorigin="anonymous"></script>
</head>

<style>
    *{
        margin:0;
        padding: 0;
        outline: none;
        border: none;
        text-decoration: none !important;
        box-sizing:border-box;
        font-family: "IBM Plex Sans", sans-serif;
    }

    /* Scrollbar CSS */
    /* REF - https://www.w3schools.com/howto/howto_css_custom_scrollbar.asp*/
    ::-webkit-scrollbar {
        height: 5px;
        width: 5px;
        border-radius: 20px;
    }

    /* Track */
    ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 20px;
    }

    /* Handle */
    ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 20px;
    }

    /* Handle on hover */
    ::-webkit-scrollbar-thumb:hover {
        background: #555;
    }

    body{
        width: 960px;
        margin: 0 auto;
        display: flex;
        flex-wrap:wrap;
        justify-content: space-between;

        position: absolute;

        animation: fadeInAnimation ease 1s;

        overflow: hidden;
    }



    nav{
        position: fixed;

        top: 0;
        bottom: 0;
        left:0;

        height: 100%;
        width:100px;

        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        overflow: hidden;

        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(1px);

    }



    .course-card{
        position: relative;

        padding: 10px;

        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(1px);

        width: 300px;
        height: 175px;

        margin-right: 20px;

        min-width: 300px;
        min-height: 150px;

        max-width: 300px;
        max-height: 150px;

        border-radius: 20px;
        text-align: center;
    }



    .nav-button:hover{
        background: rgba(0,0,0,0.7);
        color: white;
        transition: background 0.25s ease-in, color 0.25s ease-in;
    }


    .nav-button{
        width: 100%;
        height: 90px;
        font-size: 25px;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(1px);
    }

    .current-nav-button{
        color: white;
        background: rgba(0,0,0,0.7);
        width: 100%;
        height: 90px;
        font-size: 25px;
    }

    ul{
        margin-top:50px;

    }


    h1{
        position: fixed;
        margin-top: 25px;
        left:160px;


    }

    .content{

        min-width: 1100px;
        height: 500px;
        margin-left: 200px;
        margin-top: 130px;
        padding-left: 20px;
        padding-bottom: 10px;
        display: flex;
        flex-direction: row;
        justify-content: space-around;
    }

    .card{


        width: 450px;

        height: 400px;

        margin-top: 10px;
        margin-bottom: 10px;


        padding: 10px;


        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(1px);

    }



    .badge-icon{
        width: 80px;
        height: 80px;
        margin-right: 10px;
        border-radius: 50%;
        border: 2px solid black;
    }

    .badge-list{

        width: 424px;
        margin-top: 40px;

        padding: 10px;

        overflow-y: auto;
        overflow-x: hidden;

        height: 90%;

    }


    .badge-container {
        border: 2px solid black;
        display: flex;
        align-items: center;
        margin-top: 10px;



        min-width: 400px;
        max-width: 400px;

        min-height: 100px;
        max-height: 100px;

        border-radius: 20px;
        padding: 20px;


    }

    h2{
        position: fixed;
        margin-left: 20px;
        margin-top: 10px;
    }




</style>

<body>
<!-- Navigation bar -->
<nav>
    <ul>
        <li>
            <a th:href="@{/dashboard}">
                <button class = "nav-button">
                    <i class="fa-solid fa-house"></i>
                </button>
            </a>
        </li>
        <li>
            <!-- Direct to course page -->
            <a th:href="@{/viewCourses}">
                <button class = "nav-button">
                    <i class="fa-solid fa-book"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/viewBadges}">
                <!--Button that directs to badge page-->
                <button class = "current-nav-button">
                    <i class="fa-solid fa-medal"></i>
                </button>
            </a>
        </li>
        <li>
            <a th:href="@{/dailyChallenge}">
                <button class = "nav-button">
                    <i class="fa-solid fa-brain"></i>
                </button>
            </a>
        </li>

        <li>
            <a th:href="@{/popularpage}">
                <button class = "nav-button">
                    <i class="fa-solid fa-fire"></i>
                </button>
            </a>
        </li>

        <li>
            <a th:href="@{/leaderboard}">
                <button class = "nav-button">
                    <i class="fa-solid fa-trophy"></i>
                </button>
            </a>
        </li>

        <li>
            <span th:if="${user.admin}">
                <a th:href="@{/testanalytics}">
                    <button class = "nav-button">
                        <i class="fa-solid fa-code"></i>
                    </button>
                </a>
            </span>
        </li>

    </ul>
</nav>
<h1>Your Badges.</h1>
<div class = "content">

    <div class="card">
        <h2>Badges Collected</h2>
        <div class = "badge-list">

            <!-- List of all badges users own sent as a model -->
            <div th:each="item : ${user_badges}">
                <div class="badge-container">
                    <img class="badge-icon" th:if="${item.id == 1}" src="https://i.ibb.co/DwDqwRN/first-login.jpg" alt="BadgeIcon">
                    <img class="badge-icon" th:if="${item.id == 2}" src="https://i.ibb.co/Q8RQdQN/first-course.jpg" alt="BadgeIcon">
                    <img class="badge-icon" th:if="${item.id == 3}" src="https://i.ibb.co/jZ79pqR/The-Two-Time.jpg" alt="BadgeIcon">
                    <img class="badge-icon" th:if="${item.id == 4}" src="https://i.ibb.co/gVJyRnK/Speedster.jpg" alt="BadgeIcon">
                    <div class="badge-text">
                        <p th:text="${item.name}"></p>
                        <h5 th:text="${item.description}"></h5>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <div class="card">
        <h2>Badges Yet To Unlock</h2>
        <div class = "badge-list">
            <div th:each="item : ${no_badge}">
                <div class="badge-container">
                    <img class="badge-icon" th:if="${item.id == 1}" src="https://i.ibb.co/DwDqwRN/first-login.jpg" alt="BadgeIcon">
                    <img class="badge-icon" th:if="${item.id == 2}" src="https://i.ibb.co/Q8RQdQN/first-course.jpg" alt="BadgeIcon">
                    <img class="badge-icon" th:if="${item.id == 3}" src="https://i.ibb.co/jZ79pqR/The-Two-Time.jpg" alt="BadgeIcon">
                    <img class="badge-icon" th:if="${item.id == 4}" src="https://i.ibb.co/gVJyRnK/Speedster.jpg" alt="BadgeIcon">
                    <div class="badge-text">
                        <p th:text="${item.name}"></p>
                        <h5 th:text="${item.description}"></h5>
                    </div>
                </div>
            </div>
        </div>
    </div>




</div>



</body>


</html>
