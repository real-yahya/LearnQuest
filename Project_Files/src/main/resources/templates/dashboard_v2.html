    /* Scrollbar CSS */
    /* REF - https://www.w3schools.com/howto/howto_css_custom_scrollbar.asp*/
    ::-webkit-scrollbar {
        height: 5px;
        width: 5px;
        border-radius: 20px;
    }

    /* Track */
    ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 20px;
    }

    /* Handle */
    ::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 20px;
    }

    /* Handle on hover */
    ::-webkit-scrollbar-thumb:hover {
        background: #555;
    }

    /*Idle float animation*/

        0% { transform: translate(0,  0px); }
        50%  { transform: translate(0, 20px); }

            <div id = "progress-box">
                <p><i class="fa-solid fa-bars-progress"></i> Overall Progress </p>
                <div class = "chart-box">
                    <canvas id ="pie-chart" class="animate-pie-chart" width="180" height="180"></canvas>
                    <ul id ="pie-chart-legends">
                        <li class = "legend-element"> <i class="fa-solid fa-square"></i> Completed </li>
                        <li class = "legend-element"> <i class="fa-regular fa-square"></i> Not completed </li>
                    </ul>

                </div>

                <script>
                    document.addEventListener("DOMContentLoaded", showPieChart);

                    function showPieChart(){
                        console.log("function on load");

                        var value1 = [[${valA}]];
                        var value2 = [[${valB}]];

                        let sliceA={size:value1, color: "black", border:"2px solid black"};
                        let sliceB={size:value2, color: "white", border:"2px solid black"};

                        const values=[sliceA.size, sliceB.size];

                        const total = values.reduce((acc,val)=> acc + val, 0);

                        let startAngle = 0;

                        const canvas = document.getElementById("pie-chart");
                        const ctx = canvas.getContext("2d");

                        values.forEach((value,index) => {
                            const angle = (value/total) * Math.PI * 2;

                            ctx.beginPath();
                            ctx.moveTo(canvas.width/2, canvas.height/2);
                            ctx.arc(
                                canvas.width / 2,
                                canvas.height/2,
                                canvas.width/2,
                                startAngle - 0.02,
                                startAngle + angle + 0.02
                            )
                            ctx.closePath();

                            ctx.fillStyle = index === 0 ? sliceA.color : sliceB.color;
                            ctx.fill();

                            ctx.strokeStyle = index === 0 ? sliceA.border : sliceB.border;
                            ctx.lineWidth = 2; // Adjust border thickness if needed
                            ctx.stroke();

                            startAngle += angle;


                        });

                    }

                </script>
            </div>



        <div id="time-box">
            <span id="clock"></span>
        </div>

        <script type="text/javascript">
            var clockElement = document.getElementById('clock');

            function clock() {
                var currentDate = new Date();
                var options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
                var formattedDate = currentDate.toLocaleString('en-US', options);
                var timeString = ('0' + currentDate.getHours()).slice(-2) + ':' + ('0' + currentDate.getMinutes()).slice(-2);
                clockElement.textContent = formattedDate + "\n" + timeString;
            }

            setInterval(clock, 1000);
        </script>
