<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
>
<head>
  <meta charset="UTF-8">
  <title>Registration and Login System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
        crossorigin="anonymous">
  <style media="screen">
    *,
    *:before,
    *:after{
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    body{
      background-color: #080710;
    }
    .background{
      width: 490px;
      height: 700px;
      position: absolute;
      transform: translate(-50%,-50%);
      left: 50%;
      top: 50%;
    }
    .background .shape{
      height: 200px;
      width: 200px;
      position: absolute;
      border-radius: 50%;
    }
    .shape:first-child{
      background: linear-gradient(
              #1845ad,
              #23a2f6
      );
      left: -80px;
      top: -80px;
    }
    .shape:last-child{
      background: linear-gradient(
              to right,
              #ff512f,
              #f09819
      );
      right: -30px;
      bottom: -80px;
    }
    form{
      height: 740px;
      width: 440px;
      background-color: rgba(255,255,255,0.13);
      position: absolute;
      transform: translate(-50%,-50%);
      top: 50%;
      left: 50%;
      border-radius: 10px;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 40px rgba(8,7,16,0.6);
      padding: 50px 35px;
    }
    form *{
      font-family: 'Poppins',sans-serif;
      color: #ffffff;
      letter-spacing: 0.5px;
      outline: none;
      border: none;
    }
    form h3{
      font-size: 32px;
      font-weight: 500;
      line-height: 42px;
      text-align: center;
    }

    label{
      display: block;
      margin-top: 25px;
      font-size: 16px;
      font-weight: 500;
    }
    input{
      display: block;
      height: 50px;
      width: 100%;
      background-color: rgba(255,255,255,0.07);
      border-radius: 3px;
      padding: 0 10px;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 300;
    }
    ::placeholder{
      color: #e5e5e5;
    }

    button{
      margin-top: 35px;
      width: 100%;
      background-color: #ffffff;
      color: #575757;
      padding: 15px 0;
      font-size: 18px;
      font-weight: 600;
      border-radius: 5px;
    }
    button:hover{
      color: #000000;

    }
    a{
      cursor:pointer;
      text-decoration: none;
      text-underline: none;
    }
    a:hover{
      color: #ffffff;
    }
    .register {
      margin-top:25px;
      background-color: rgba(24, 69, 173, 1);
      color: #efefef;
    }
    .social{
      margin-top: 30px;
      display: flex;
    }
    .social div{
      background: red;
      width: 150px;
      border-radius: 3px;
      padding: 5px 10px 10px 5px;
      background-color: rgba(255,255,255,0.27);
      color: #eaf0fb;
      text-align: center;
    }
    .social div:hover{
      background-color: rgba(255,255,255,0.47);
    }
    .social .fb{
      margin-left: 25px;
    }
    .social i{
      margin-right: 4px;
    }

  </style>
</head>
<body>
<div class="background">
  <div class="shape"></div>
  <div class="shape"></div>
</div>
<div th:if="${param.success}">
  <div class="alert alert-info">
    You have successfully registered our app!
  </div>
</div>
<form method="post"
      role="form"
      th:action="@{/register/save}"
      th:object="${user}"
>
  <h3>Register</h3>

  <nobr><label >First Name</label>
    <p th:errors = "*{firstName}" class="text-danger"
       th:if="${#fields.hasErrors('firstName')}"></p></nobr>
  <input
          id="firstName"
          name="firstName"
          placeholder="Enter first name"
          th:field="*{firstName}"
          type="text"
  />


  <nobr><label >Last Name</label>
    <p th:errors = "*{lastName}" class="text-danger"
       th:if="${#fields.hasErrors('lastName')}"></p></nobr>
  <input
          id="lastName"
          name="lastName"
          placeholder="Enter last name"
          th:field="*{lastName}"
          type="text"
  />


  <nobr><label >Email</label>
    <p th:errors = "*{email}" class="text-danger"
       th:if="${#fields.hasErrors('email')}"></p></nobr>
  <input
          id="email"
          name="email"
          placeholder="Enter email address"
          th:field="*{email}"
          type="email"
  />


  <nobr><label >Password</label>
    <p th:errors = "*{password}" class="text-danger"
       th:if="${#fields.hasErrors('password')}"></p></nobr>
  <input
          id="password"
          name="password"
          placeholder="Enter password"
          th:field="*{password}"
          type="password"
  />




  <button type="submit">Register</button>
  <button class="register" ><a th:href="@{/login}">Login</a></button>



</form>
</body>
</html>
